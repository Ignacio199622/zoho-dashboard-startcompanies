<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Companies — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#006AFE;--dark:#001627;--cyan:#01C9E2;--gold:#C9A227;--green:#00b67a;
  --surface:#0a2540;--surface2:#112d4a;--border:#1a3a5c;--text:#e8edf2;--text2:#8899aa;
  --radius:12px;--red:#ff4757;
}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}
a{color:var(--cyan);text-decoration:none}

/* ===== LOGIN ===== */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--dark)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:400px;text-align:center}
.login-logo-img{height:48px;margin-bottom:24px}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:32px}
.login-input{width:100%;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;margin-bottom:12px;outline:none;transition:border .2s}
.login-input:focus{border-color:var(--blue)}
.login-input::placeholder{color:var(--text2)}
.login-btn{width:100%;padding:12px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:8px}
.login-btn:hover{opacity:.9}
.login-error{color:var(--red);font-size:13px;margin-top:12px;min-height:20px}

/* ===== HEADER ===== */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 32px;background:var(--surface);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:12px}
.logo-img{height:32px}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}
.status-text{font-size:12px;color:var(--text2)}
.user-badge{background:var(--surface2);padding:6px 14px;border-radius:20px;font-size:13px;color:var(--text2)}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--text2);color:var(--text)}

/* ===== LEMA ===== */
.lema-bar{text-align:center;padding:14px 16px;background:linear-gradient(90deg,var(--dark),rgba(0,106,254,.12),var(--dark));border-bottom:1px solid var(--border);animation:lemaIn 1.2s ease-out;position:relative;overflow:hidden}
.lema-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--gold),var(--cyan),transparent)}
.lema-text{font-size:15px;font-weight:700;background:linear-gradient(90deg,var(--cyan),var(--gold),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px;text-transform:uppercase;animation:lemaShine 4s ease-in-out infinite}
@keyframes lemaIn{0%{opacity:0;transform:translateY(-8px)}100%{opacity:1;transform:translateY(0)}}
@keyframes lemaShine{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}

/* ===== LAYOUT ===== */
.container{max-width:1440px;margin:0 auto;padding:20px 32px}

/* ===== METRICS ===== */
.metrics-section{margin-bottom:20px}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:12px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;position:relative;overflow:hidden}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue)}
.metric-card.cyan::before{background:var(--cyan)}
.metric-card.gold::before{background:var(--gold)}
.metric-card.green::before{background:var(--green)}
.metric-card.red::before{background:var(--red)}
.metric-card.purple::before{background:#b388ff}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.metric-value{font-size:28px;font-weight:700;line-height:1;color:var(--blue)}
.metric-card.cyan .metric-value{color:var(--cyan)}
.metric-card.gold .metric-value{color:var(--gold)}
.metric-card.green .metric-value{color:var(--green)}
.metric-card.red .metric-value{color:var(--red)}
.metric-card.purple .metric-value{color:#b388ff}
.metric-sub{font-size:11px;color:var(--text2);margin-top:4px}
.metrics-row-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;padding:6px 0;transition:color .2s}
.metrics-row-title:hover{color:var(--text)}
.metrics-row-title .toggle-arrow{font-size:10px;transition:transform .2s;display:inline-block}
.metrics-row-title .toggle-arrow.collapsed{transform:rotate(-90deg)}
.metrics-group{overflow:hidden;transition:max-height .3s ease,opacity .2s ease;max-height:500px;opacity:1}
.metrics-group.collapsed{max-height:0;opacity:0;margin-bottom:0}

/* ===== TABS ===== */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface);border-radius:var(--radius);padding:4px;border:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all .2s;border:none;background:none;font-family:inherit;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{background:var(--blue);color:#fff}

/* ===== FILTERS ===== */
.filters-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.filter-select,.filter-date{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:13px;outline:none;min-width:150px;transition:border .2s}
.filter-select:focus,.filter-date:focus{border-color:var(--blue)}
.filter-date{min-width:140px}
.filter-date::-webkit-calendar-picker-indicator{filter:invert(.7)}
.multi-select{position:relative;min-width:180px}
.multi-select-btn{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;transition:border .2s;gap:8px}
.multi-select-btn:hover,.multi-select-btn.open{border-color:var(--blue)}
.multi-select-btn .arrow{font-size:10px;color:var(--text2)}
.multi-select-btn .count{background:var(--blue);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.multi-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;max-height:220px;overflow-y:auto;z-index:100;display:none;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.multi-dropdown.show{display:block}
.multi-dropdown label{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:13px;cursor:pointer;transition:background .15s}
.multi-dropdown label:hover{background:var(--surface2)}
.multi-dropdown input[type="checkbox"]{accent-color:var(--blue);width:14px;height:14px}
.btn-clear-filters{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer;transition:all .2s;align-self:flex-end}
.btn-clear-filters:hover{border-color:var(--text2);color:var(--text)}

/* ===== TABLE ===== */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.table-title-group{display:flex;align-items:center;gap:16px}
.table-title{font-size:16px;font-weight:600}
.table-count{font-size:13px;color:var(--text2)}
.export-group{display:flex;gap:8px}
.btn-export{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-export:hover{border-color:var(--blue);color:var(--blue)}
.btn-export svg{width:14px;height:14px}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--surface2)}
th{padding:12px 16px;text-align:left;font-weight:600;color:var(--text2);text-transform:uppercase;font-size:11px;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
tr:hover td{background:rgba(0,106,254,.05)}
tr:last-child td{border-bottom:none}
tr.alert-row td{background:rgba(201,162,39,.08);border-left:3px solid var(--gold)}
tr.alert-row td:first-child{padding-left:12px}
tr.alert-row td:first-child::before{content:'\1F525 ';font-size:13px}

/* ===== NOTES ===== */
.note-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;opacity:.4;transition:opacity .2s}
.note-btn:hover{opacity:1}
.note-btn.has-note{opacity:.9;filter:drop-shadow(0 0 3px var(--gold))}
.note-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.note-modal-overlay.show{display:flex}
.note-modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:480px;animation:lemaIn .2s ease-out}
.note-modal h3{font-size:15px;margin-bottom:4px}
.note-modal .note-who{font-size:12px;color:var(--text2);margin-bottom:12px}
.note-modal textarea{width:100%;min-height:100px;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;resize:vertical;outline:none}
.note-modal textarea:focus{border-color:var(--blue)}
.note-modal-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.note-modal-actions button{padding:8px 20px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none}
.note-save{background:var(--blue);color:#fff}
.note-cancel{background:var(--surface2);color:var(--text2);border:1px solid var(--border) !important}

/* ===== BADGES ===== */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.badge-blue{background:rgba(0,106,254,.15);color:#4d9aff}
.badge-cyan{background:rgba(1,201,226,.15);color:var(--cyan)}
.badge-gold{background:rgba(201,162,39,.15);color:var(--gold)}
.badge-green{background:rgba(0,182,122,.15);color:var(--green)}
.badge-red{background:rgba(255,71,87,.15);color:var(--red)}
.badge-gray{background:rgba(136,153,170,.15);color:var(--text2)}
.badge-purple{background:rgba(155,89,255,.15);color:#b388ff}

/* ===== LOADING ===== */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text2);font-size:14px}

/* ===== ERROR ===== */
.error-banner{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);border-radius:var(--radius);padding:16px 24px;margin-bottom:16px;color:var(--red);font-size:14px;display:none}

#dashboardApp{display:none}

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
  .metrics-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:768px){
  .header{padding:10px 16px;flex-direction:column;gap:10px}
  .header-right{justify-content:center;width:100%}
  .container{padding:16px}
  .metrics-grid{grid-template-columns:repeat(2,1fr)}
  .metric-value{font-size:22px}
  .filters-bar{flex-direction:column;align-items:stretch}
  .filter-select,.filter-date,.multi-select{min-width:100%;width:100%}
  .multi-select-btn{width:100%}
  .table-header{flex-direction:column;align-items:flex-start}
  .lema-text{font-size:12px;letter-spacing:1.5px}
}
@media(max-width:480px){
  .metrics-grid{grid-template-columns:1fr}
  .tabs{gap:2px}
  .tab{padding:8px 14px;font-size:13px}
  .logo-img{height:24px}
  .header-right{gap:8px}
  .user-badge{font-size:11px;padding:4px 10px}
}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <img src="logo.png" alt="Start Companies" class="login-logo-img">
    <div class="login-title">Dashboard</div>
    <div class="login-sub">Ingresa tus credenciales para acceder</div>
    <form onsubmit="handleLogin(event)">
      <input class="login-input" type="text" id="loginUser" placeholder="Usuario" autocomplete="username" required>
      <input class="login-input" type="password" id="loginPass" placeholder="Contrasena" autocomplete="current-password" required>
      <button class="login-btn" type="submit">Iniciar Sesion</button>
    </form>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboardApp">
  <div class="header">
    <div class="logo">
      <img src="logo.png" alt="Start Companies" class="logo-img">
    </div>
    <div class="header-right">
      <button class="btn-export" onclick="manualRefresh()" id="btnRefresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.64-12.36L3 9"/></svg>
        Actualizar datos
      </button>
      <div class="status-text" id="lastUpdate">Cargando...</div>
      <div class="user-badge" id="userBadge"></div>
      <button class="logout-btn" onclick="handleLogout()">Salir</button>
    </div>
  </div>

  <div class="lema-bar">
    <div class="lema-text">Orden y Progreso</div>
  </div>

  <div class="container">
    <div class="error-banner" id="errorBanner"></div>

    <!-- Metrics -->
    <div class="metrics-section" id="metricsSection"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('leads')">Lead Totales</button>
      <button class="tab" onclick="switchTab('llcs')">LLCs Apertura</button>
      <button class="tab" onclick="switchTab('seguimientos')">Seguimientos</button>
    </div>

    <!-- Filters -->
    <div class="filters-bar" id="filtersBar"></div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title-group">
          <div class="table-title" id="tableTitle">Lead Totales y Flujos</div>
          <div class="table-count" id="tableCount"></div>
        </div>
        <div class="export-group">
          <button class="btn-export" onclick="exportCSV()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            CSV
          </button>
          <button class="btn-export" onclick="exportPDF()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            PDF
          </button>
        </div>
      </div>
      <div class="table-scroll" id="tableContent">
        <div class="loading"><div class="spinner"></div><div class="loading-text">Conectando con Zoho Analytics...</div></div>
      </div>
    </div>
  </div>

  <!-- Note Modal -->
  <div class="note-modal-overlay" id="noteOverlay" onclick="if(event.target===this)closeNote()">
    <div class="note-modal">
      <h3 id="noteTitle"></h3>
      <div class="note-who" id="noteWho"></div>
      <textarea id="noteText" placeholder="Escribi una nota..."></textarea>
      <div class="note-modal-actions">
        <button class="note-cancel" onclick="closeNote()">Cancelar</button>
        <button class="note-save" onclick="saveNote()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script>
// ===== AUTH =====
const USERS = {
  tomas: 'd47edf81eaadf9bdd466903719e772e1846bc2f69eeb2cadb29780aa639eabea',
  belen: 'd47edf81eaadf9bdd466903719e772e1846bc2f69eeb2cadb29780aa639eabea',
  ignacio: 'd47edf81eaadf9bdd466903719e772e1846bc2f69eeb2cadb29780aa639eabea',
  santiago: 'd47edf81eaadf9bdd466903719e772e1846bc2f69eeb2cadb29780aa639eabea',
  ignaciocampo: 'd47edf81eaadf9bdd466903719e772e1846bc2f69eeb2cadb29780aa639eabea'
};
async function sha256(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
async function handleLogin(e){
  e.preventDefault();
  const user=document.getElementById('loginUser').value.trim().toLowerCase();
  const pass=document.getElementById('loginPass').value;
  const hash=await sha256(pass);
  if(USERS[user]&&USERS[user]===hash){
    const expires=Date.now()+30*24*60*60*1000;
    localStorage.setItem('sc_user',JSON.stringify({user,expires}));
    showDashboard(user);
  } else{document.getElementById('loginError').textContent='Usuario o contrasena incorrectos'}
}
function handleLogout(){localStorage.removeItem('sc_user');location.reload()}
function showDashboard(user){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashboardApp').style.display='block';
  document.getElementById('userBadge').textContent=user;
  fetchData();
}
(function(){
  try{
    const raw=localStorage.getItem('sc_user');
    if(!raw)return;
    const{user,expires}=JSON.parse(raw);
    if(Date.now()>expires){localStorage.removeItem('sc_user');return}
    if(USERS[user])showDashboard(user);
  }catch(e){localStorage.removeItem('sc_user')}
})();

// ===== STATE =====
let DATA=null, currentTab='leads', filters={};
const TITLES={leads:'Lead Totales y Flujos',llcs:'LLCs Apertura Mes Actual',seguimientos:'Seguimientos'};

// ===== DATE HELPERS =====
function parseDate(str){if(!str)return null;const d=new Date(str);return isNaN(d)?null:d}
function isToday(d){if(!d)return false;const t=new Date();return d.toDateString()===t.toDateString()}
function isThisWeek(d){if(!d)return false;const now=new Date(),start=new Date(now);start.setDate(now.getDate()-now.getDay());start.setHours(0,0,0,0);return d>=start&&d<=now}

// ===== MATCHING HELPERS =====
function normEmail(e){return(e||'').trim().toLowerCase()}
function pct(a,b){return b?Math.round(a/b*100):0}
function isJunkCanal(c){const l=(c||'').toLowerCase();return l.includes('timelines')||l.includes('+1786')||l.includes('+1789')||l==='otro'||l.includes('no se asign')}
let collapsedSections=null;
function initCollapsed(){if(!collapsedSections)collapsedSections={}}
function mSection(id,title,content){
  initCollapsed();
  const isCol=collapsedSections[id]!==false;// default collapsed
  return `<div class="metrics-row-title" onclick="toggleSection('${id}')"><span class="toggle-arrow${isCol?' collapsed':''}">\u25BC</span>${title}</div><div class="metrics-group${isCol?' collapsed':''}" id="mg_${id}">${content}</div>`;
}
function toggleSection(id){
  initCollapsed();
  collapsedSections[id]=collapsedSections[id]===false?true:false;
  const el=document.getElementById('mg_'+id);
  const arrow=el.previousElementSibling.querySelector('.toggle-arrow');
  el.classList.toggle('collapsed');
  arrow.classList.toggle('collapsed');
}

// ===== METRICS =====
function renderMetricsLeads(rows, allLLCs, allSeguimientos){
  const total=rows.length;
  const calif=rows.filter(r=>(r['Calificaci\u00f3n']||r['Calificacion']||'').toLowerCase().includes('sql calificado')).length;
  const noShow=rows.filter(r=>(r['Calificaci\u00f3n']||r['Calificacion']||'').toLowerCase().includes('no show')).length;
  const agendo=rows.filter(r=>r['\u00bfAgend\u00f3?']==='S\u00ed').length;
  const tasaAg=pct(agendo,total);
  const today=rows.filter(r=>isToday(parseDate(r['Fecha']))).length;
  const week=rows.filter(r=>isThisWeek(parseDate(r['Fecha']))).length;

  // By channel
  const channels={};
  rows.forEach(r=>{const c=r['Canal']||'Otro';channels[c]=(channels[c]||0)+1});
  const organic=channels['Web Organic']||0;
  const meta=(channels['Meta Form']||0)+(channels['Facebook']||0);
  const landing=channels['Landing Page']||0;
  const wa=Object.entries(channels).filter(([k])=>k.toLowerCase().includes('whatsapp')).reduce((s,[,v])=>s+v,0);
  const referidos=(channels['Referidos']||0)+(channels['Marca Personal']||0);

  const metaAll=rows.filter(r=>{const c=(r['Canal']||'').toLowerCase();return c.includes('meta')||c.includes('facebook')});
  const metaAg=metaAll.filter(r=>r['\u00bfAgend\u00f3?']==='S\u00ed').length;
  const metaPct=pct(metaAg,metaAll.length);

  // Funnel: Lead → Agendó → Asistió → SQL → LLC
  const leadEmails=new Set(rows.map(r=>normEmail(r['Mail'])).filter(Boolean));
  const asistioCount=allSeguimientos?allSeguimientos.filter(r=>{
    const m=(r['Estado del Meeting']||'').toLowerCase();
    return m.includes('asisti')&&!m.includes('no asisti')&&leadEmails.has(normEmail(r['Mail']));
  }).length:0;
  const llcCount=allLLCs?allLLCs.filter(r=>leadEmails.has(normEmail(r['Email']))).length:0;

  // Rendimiento por vendedor (excluir Staff)
  const vendorMap={};
  rows.forEach(r=>{
    const v=r['Vendedor asignado']||'';
    if(v&&!v.includes('Start Companies Staff')){
      if(!vendorMap[v])vendorMap[v]={total:0,agendo:0};
      vendorMap[v].total++;
      if(r['\u00bfAgend\u00f3?']==='S\u00ed')vendorMap[v].agendo++;
    }
  });
  const vendors=Object.entries(vendorMap).filter(([,d])=>d.total>=2).sort((a,b)=>b[1].total-a[1].total);

  // Canal más rentable (conversión a LLC)
  let canalRentHTML='';
  if(allLLCs){
    const canalConv={};
    rows.forEach(r=>{const c=r['Canal']||'Otro';if(!canalConv[c])canalConv[c]={leads:0,llcs:0};canalConv[c].leads++});
    allLLCs.forEach(r=>{
      const email=normEmail(r['Email']);if(!email)return;
      const lead=rows.find(l=>normEmail(l['Mail'])===email);
      if(lead){const c=lead['Canal']||'Otro';if(canalConv[c])canalConv[c].llcs++}
    });
    const canales=Object.entries(canalConv).filter(([c,d])=>d.leads>=3&&!isJunkCanal(c)&&d.llcs>0).sort((a,b)=>pct(b[1].llcs,b[1].leads)-pct(a[1].llcs,a[1].leads));
    if(canales.length){
      canalRentHTML=mSection('l_conv','Conversi\u00f3n por Canal (Lead \u2192 LLC)',`<div class="metrics-grid">
        ${canales.map(([c,d])=>`<div class="metric-card${pct(d.llcs,d.leads)>=20?' green':pct(d.llcs,d.leads)>=10?' cyan':' gold'}"><div class="metric-label">${esc(c)}</div><div class="metric-value">${pct(d.llcs,d.leads)}%</div><div class="metric-sub">${d.llcs} LLCs de ${d.leads} leads</div></div>`).join('')}
      </div>`);
    }
  }

  let vendorHTML='';
  if(vendors.length){
    vendorHTML=mSection('l_vend','Rendimiento por Vendedor',`<div class="metrics-grid">
      ${vendors.map(([v,d])=>`<div class="metric-card"><div class="metric-label">${esc(v)}</div><div class="metric-value">${d.total}</div><div class="metric-sub">${pct(d.agendo,d.total)}% agendaron</div></div>`).join('')}
    </div>`);
  }

  // No-Show por Canal (en Leads, cruzando con seguimientos)
  let nsLeadHTML='';
  if(allSeguimientos){
    const canalNSL={};
    allSeguimientos.forEach(r=>{
      if(!leadEmails.has(normEmail(r['Mail'])))return;
      const c=r['Canal de Origen']||'Otro';
      const m=(r['Estado del Meeting']||'').toLowerCase();
      if(!m||m==='sin informaci\u00f3n')return;
      if(isJunkCanal(c))return;
      if(!canalNSL[c])canalNSL[c]={total:0,noShow:0};
      canalNSL[c].total++;
      if(m.includes('no asisti'))canalNSL[c].noShow++;
    });
    const cnsArr=Object.entries(canalNSL).filter(([,d])=>d.total>=2).sort((a,b)=>pct(b[1].noShow,b[1].total)-pct(a[1].noShow,a[1].total));
    if(cnsArr.length){
      nsLeadHTML=mSection('l_noshow','No-Show por Canal',`<div class="metrics-grid">
        ${cnsArr.map(([c,d])=>{const p=pct(d.noShow,d.total);const cl=p>30?'red':p>15?'gold':'green';
          return `<div class="metric-card ${cl}"><div class="metric-label">${esc(c)}</div><div class="metric-value">${p}%</div><div class="metric-sub">${d.noShow} de ${d.total}</div></div>`}).join('')}
      </div>`);
    }
  }

  return `
    ${mSection('l_resumen','Resumen',`<div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Total Leads</div><div class="metric-value">${total}</div></div>
      <div class="metric-card green"><div class="metric-label">SQL Calificados</div><div class="metric-value">${calif}</div></div>
      <div class="metric-card red"><div class="metric-label">No Show</div><div class="metric-value">${noShow}</div></div>
      <div class="metric-card cyan"><div class="metric-label">Tasa Agendamiento</div><div class="metric-value">${tasaAg}%</div><div class="metric-sub">${agendo} de ${total} agendaron</div></div>
      <div class="metric-card gold"><div class="metric-label">Hoy / Semana / Total</div><div class="metric-value">${today}</div><div class="metric-sub">${week} semana \u00b7 ${total} total</div></div>
    </div>`)}
    ${mSection('l_canal','Leads por Canal',`<div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Org\u00e1nico</div><div class="metric-value">${organic}</div></div>
      <div class="metric-card purple"><div class="metric-label">Meta Form</div><div class="metric-value">${meta}</div><div class="metric-sub">${metaAg} agendaron (${metaPct}%)</div></div>
      <div class="metric-card cyan"><div class="metric-label">Landing Page</div><div class="metric-value">${landing}</div></div>
      <div class="metric-card green"><div class="metric-label">WhatsApp</div><div class="metric-value">${wa}</div></div>
      <div class="metric-card gold"><div class="metric-label">Referidos</div><div class="metric-value">${referidos}</div></div>
    </div>`)}
    ${mSection('l_funnel','Funnel Completo',`<div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Leads</div><div class="metric-value">${total}</div></div>
      <div class="metric-card cyan"><div class="metric-label">Agendaron</div><div class="metric-value">${agendo}</div><div class="metric-sub">${tasaAg}% de leads</div></div>
      <div class="metric-card green"><div class="metric-label">Asistieron</div><div class="metric-value">${asistioCount}</div><div class="metric-sub">${pct(asistioCount,agendo)}% de agendados</div></div>
      <div class="metric-card gold"><div class="metric-label">SQL Calificado</div><div class="metric-value">${calif}</div><div class="metric-sub">${pct(calif,asistioCount)}% de asistidos</div></div>
      <div class="metric-card purple"><div class="metric-label">LLC Abierta</div><div class="metric-value">${llcCount}</div><div class="metric-sub">${pct(llcCount,calif)}% de SQL</div></div>
    </div>`)}
    ${canalRentHTML}
    ${nsLeadHTML}
    ${vendorHTML}`;
}

function renderMetricsLLCs(rows, allLeads){
  const confirmadas=rows.filter(r=>(r['Etapa']||'').toLowerCase().includes('confirmada')).length;
  const enProceso=rows.filter(r=>{const e=(r['Etapa']||'').toLowerCase();return e.includes('filing')||e.includes('activa')}).length;
  const bancaria=rows.filter(r=>(r['Etapa']||'').toLowerCase().includes('cuenta bancaria confirmada')).length;
  const pagaron=rows.filter(r=>{const p=(r['Confirmaci\u00f3n de pago']||r['Confirmacion de pago']||'').toLowerCase();return p&&p!=='sin pago'}).length;
  const sinPago=rows.filter(r=>{const p=(r['Confirmaci\u00f3n de pago']||r['Confirmacion de pago']||'').toLowerCase();return !p||p==='sin pago'}).length;

  // Velocidad de cierre: desde contacto en calendario (meeting) hasta inicio de filing
  let velHTML='';
  if(allLeads){
    const days=[];
    rows.forEach(r=>{
      const filingDate=parseDate(r['Fecha']);
      const email=normEmail(r['Email']);
      if(!email||!filingDate)return;
      // Find the earliest meeting date for this contact from leads
      const lead=allLeads.find(l=>normEmail(l['Mail'])===email);
      if(!lead)return;
      const contactDate=parseDate(lead['Fecha']);
      if(!contactDate)return;
      const diff=Math.round((filingDate-contactDate)/(1000*60*60*24));
      if(diff>=0)days.push(diff);
    });
    if(days.length){
      days.sort((a,b)=>a-b);
      const avg=Math.round(days.reduce((s,d)=>s+d,0)/days.length);
      const median=days[Math.floor(days.length/2)];
      const min=days[0];
      const max=days[days.length-1];
      velHTML=mSection('ll_vel','Velocidad de Cierre (Contacto \u2192 Filing)',`<div class="metrics-grid">
        <div class="metric-card cyan"><div class="metric-label">Promedio</div><div class="metric-value">${avg}d</div></div>
        <div class="metric-card gold"><div class="metric-label">Mediana</div><div class="metric-value">${median}d</div></div>
        <div class="metric-card green"><div class="metric-label">M\u00e1s r\u00e1pido</div><div class="metric-value">${min}d</div></div>
        <div class="metric-card red"><div class="metric-label">M\u00e1s lento</div><div class="metric-value">${max}d</div></div>
      </div>`);
    }
  }

  // Desglose por etapa
  const etapaMap={};
  rows.forEach(r=>{const e=r['Etapa']||'Sin etapa';etapaMap[e]=(etapaMap[e]||0)+1});
  const etapas=Object.entries(etapaMap).sort((a,b)=>b[1]-a[1]);
  const etapaColors={'confirmada':'green','filing':'blue','activa':'gold','cuenta bancaria':'cyan'};
  function etapaColor(e){const l=e.toLowerCase();for(const[k,v]of Object.entries(etapaColors))if(l.includes(k))return v;return ''}

  // LLCs por canal
  const canalLLC={};
  rows.forEach(r=>{const c=r['Canal de Origen']||'Otro';if(!isJunkCanal(c)){canalLLC[c]=(canalLLC[c]||0)+1}});
  const canalesLLC=Object.entries(canalLLC).sort((a,b)=>b[1]-a[1]);

  return `
    ${mSection('ll_estado','Estado LLCs',`<div class="metrics-grid">
      <div class="metric-card purple"><div class="metric-label">Total LLCs</div><div class="metric-value">${rows.length}</div></div>
      <div class="metric-card green"><div class="metric-label">Confirmadas</div><div class="metric-value">${confirmadas}</div><div class="metric-sub">${pct(confirmadas,rows.length)}% del total</div></div>
      <div class="metric-card gold"><div class="metric-label">En Proceso</div><div class="metric-value">${enProceso}</div><div class="metric-sub">${pct(enProceso,rows.length)}% · Filing + Activa</div></div>
      <div class="metric-card cyan"><div class="metric-label">Cuenta Bancaria OK</div><div class="metric-value">${bancaria}</div><div class="metric-sub">${pct(bancaria,rows.length)}% del total</div></div>
      <div class="metric-card"><div class="metric-label">Pagaron</div><div class="metric-value">${pagaron}</div><div class="metric-sub">${pct(pagaron,rows.length)}% del total</div></div>
      <div class="metric-card red"><div class="metric-label">Falta Pago</div><div class="metric-value">${sinPago}</div><div class="metric-sub">${pct(sinPago,rows.length)}% del total</div></div>
    </div>`)}
    ${mSection('ll_etapas','Desglose por Etapa',`<div class="metrics-grid">
      ${etapas.map(([e,n])=>`<div class="metric-card ${etapaColor(e)}"><div class="metric-label">${esc(e)}</div><div class="metric-value">${n}</div><div class="metric-sub">${pct(n,rows.length)}% del total</div></div>`).join('')}
    </div>`)}
    ${canalesLLC.length?mSection('ll_canal','LLCs por Canal',`<div class="metrics-grid">
      ${canalesLLC.map(([c,n])=>`<div class="metric-card"><div class="metric-label">${esc(c)}</div><div class="metric-value">${n}</div><div class="metric-sub">${pct(n,rows.length)}% del total</div></div>`).join('')}
    </div>`):''}
    ${velHTML}`;
}

function renderMetricsSeguimientos(rows){
  const agendados=rows.filter(r=>(r['Estado del Meeting']||'')&&(r['Estado del Meeting']||'').toLowerCase()!=='sin informaci\u00f3n').length;
  const asistio=rows.filter(r=>{const m=(r['Estado del Meeting']||'').toLowerCase();return m.includes('asisti')&&!m.includes('no asisti')}).length;
  const tasaPres=pct(asistio,agendados);
  const reagendados=rows.filter(r=>(r['Estado del Meeting']||'').toLowerCase().includes('reagend')).length;
  const sqlTotal=rows.filter(r=>(r['Estatus del Lead']||'').toLowerCase().includes('sql calificado')).length;
  const noAsistio=rows.filter(r=>(r['Estado del Meeting']||'').toLowerCase().includes('no asisti')).length;

  // No-show por canal
  const canalNS={};
  rows.forEach(r=>{
    const c=r['Canal de Origen']||'Otro';
    const m=(r['Estado del Meeting']||'').toLowerCase();
    if(!m||m==='sin informaci\u00f3n')return;
    if(!canalNS[c])canalNS[c]={total:0,noShow:0};
    canalNS[c].total++;
    if(m.includes('no asisti'))canalNS[c].noShow++;
  });
  const canalesNS=Object.entries(canalNS).filter(([c,d])=>d.total>=2&&!isJunkCanal(c)).sort((a,b)=>pct(b[1].noShow,b[1].total)-pct(a[1].noShow,a[1].total));

  let nsHTML='';
  if(canalesNS.length){
    nsHTML=mSection('s_noshow','No-Show por Canal',`<div class="metrics-grid">
      ${canalesNS.map(([c,d])=>{const p=pct(d.noShow,d.total);const cl=p>30?'red':p>15?'gold':'green';
        return `<div class="metric-card ${cl}"><div class="metric-label">${esc(c)}</div><div class="metric-value">${p}%</div><div class="metric-sub">${d.noShow} de ${d.total}</div></div>`}).join('')}
    </div>`);
  }

  return `
    ${mSection('s_resumen','Seguimientos',`<div class="metrics-grid">
      <div class="metric-card green"><div class="metric-label">Presentados</div><div class="metric-value">${asistio}</div><div class="metric-sub">${tasaPres}% de ${agendados} agendados</div></div>
      <div class="metric-card gold"><div class="metric-label">Reagendados</div><div class="metric-value">${reagendados}</div></div>
      <div class="metric-card cyan"><div class="metric-label">SQL Calificados</div><div class="metric-value">${sqlTotal}</div></div>
      <div class="metric-card red"><div class="metric-label">No Asistieron</div><div class="metric-value">${noAsistio}</div><div class="metric-sub">Para retargeting</div></div>
    </div>`)}
    ${nsHTML}`;
}

function updateMetrics(){
  if(!DATA)return;
  const el=document.getElementById('metricsSection');
  const rows=getFilteredRows();
  if(currentTab==='leads') el.innerHTML=renderMetricsLeads(rows,DATA.llcs,DATA.seguimientos);
  else if(currentTab==='llcs') el.innerHTML=renderMetricsLLCs(rows,DATA.leads);
  else el.innerHTML=renderMetricsSeguimientos(rows);
}

// ===== BADGES =====
function calificacionBadge(val){
  if(!val)return'<span class="badge badge-gray">Sin dato</span>';const v=val.toLowerCase();
  if(v.includes('sql calificado'))return`<span class="badge badge-green">${val}</span>`;
  if(v.includes('en calificaci')||v.includes('en calificacion'))return`<span class="badge badge-cyan">${val}</span>`;
  if(v.includes('no show'))return`<span class="badge badge-red">${val}</span>`;
  if(v.includes('nuevo mql'))return`<span class="badge badge-blue">${val}</span>`;
  if(v.includes('form nunca'))return`<span class="badge badge-gold">${val}</span>`;
  return`<span class="badge badge-gray">${val}</span>`;
}
function etapaBadge(val){
  if(!val)return'<span class="badge badge-gray">Sin dato</span>';const v=val.toLowerCase();
  if(v.includes('confirmada')||v.includes('cuenta bancaria confirmada'))return`<span class="badge badge-green">${val}</span>`;
  if(v.includes('cuenta bancaria')&&!v.includes('confirmada'))return`<span class="badge badge-cyan">${val}</span>`;
  if(v.includes('filing'))return`<span class="badge badge-blue">${val}</span>`;
  if(v.includes('activa'))return`<span class="badge badge-gold">${val}</span>`;
  return`<span class="badge badge-gray">${val}</span>`;
}
function meetingBadge(val){
  if(!val)return'<span class="badge badge-gray">Sin dato</span>';const v=val.toLowerCase();
  if(v.includes('asisti')&&!v.includes('no asisti'))return`<span class="badge badge-green">${val}</span>`;
  if(v.includes('reagend'))return`<span class="badge badge-gold">${val}</span>`;
  if(v.includes('no asisti'))return`<span class="badge badge-red">${val}</span>`;
  if(v.includes('sin informaci'))return`<span class="badge badge-gray">${val}</span>`;
  return`<span class="badge badge-gray">${val}</span>`;
}
function pagoBadge(val){
  if(!val)return'<span class="badge badge-gray">Sin dato</span>';const v=val.toLowerCase();
  if(v.includes('stripe'))return`<span class="badge badge-purple">${val}</span>`;
  if(v.includes('transferencia'))return`<span class="badge badge-cyan">${val}</span>`;
  if(v.includes('cripto'))return`<span class="badge badge-gold">${val}</span>`;
  if(v.includes('sin pago'))return`<span class="badge badge-gray">${val}</span>`;
  return`<span class="badge badge-gray">${val}</span>`;
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ===== MULTI-SELECT FILTERS =====
function getUniqueValues(rows,key){const s=new Set();rows.forEach(r=>{const v=r[key];if(v)s.add(v)});return[...s].sort()}

function multiSelectHTML(id,label,options){
  return `<div class="filter-group"><span class="filter-label">${label}</span>
  <div class="multi-select" id="ms_${id}">
    <div class="multi-select-btn" onclick="toggleMulti('${id}')"><span class="ms-label">Todos</span><span class="arrow">\u25BC</span></div>
    <div class="multi-dropdown" id="msd_${id}">
      ${options.map(o=>`<label><input type="checkbox" value="${esc(o)}" onchange="onMultiChange('${id}')">${esc(o)}</label>`).join('')}
    </div>
  </div></div>`;
}

function toggleMulti(id){
  // Close all others first
  document.querySelectorAll('.multi-dropdown.show').forEach(el=>{
    if(el.id!=='msd_'+id)el.classList.remove('show');
  });
  document.getElementById('msd_'+id).classList.toggle('show');
}

function onMultiChange(id){
  const checks=[...document.querySelectorAll(`#msd_${id} input:checked`)].map(c=>c.value);
  const btn=document.querySelector(`#ms_${id} .ms-label`);
  if(checks.length===0){btn.innerHTML='Todos';delete filters[id]}
  else{btn.innerHTML=checks.length+` sel. <span class="count">${checks.length}</span>`;filters[id]=checks}
  updateMetrics();renderTable();
}

// Close dropdowns on outside click
document.addEventListener('click',e=>{
  if(!e.target.closest('.multi-select')){
    document.querySelectorAll('.multi-dropdown.show').forEach(el=>el.classList.remove('show'));
  }
});

function filterDate(id,label){
  return `<div class="filter-group"><span class="filter-label">${label}</span>
  <input type="date" class="filter-date" id="filter_${id}" onchange="onDateChange()"></div>`;
}
function onDateChange(){
  const desde=document.getElementById('filter_desde');
  const hasta=document.getElementById('filter_hasta');
  if(desde&&desde.value)filters.desde=desde.value;else delete filters.desde;
  if(hasta&&hasta.value)filters.hasta=hasta.value;else delete filters.hasta;
  updateMetrics();renderTable();
}

function buildFilters(){
  if(!DATA)return;
  const bar=document.getElementById('filtersBar');
  let html='';
  if(currentTab==='leads'){
    html+=multiSelectHTML('canal','Canal',getUniqueValues(DATA.leads,'Canal'));
    html+=multiSelectHTML('calificacion','Calificaci\u00f3n',getUniqueValues(DATA.leads,'Calificaci\u00f3n'));
    html+=multiSelectHTML('vendedor','Vendedor',getUniqueValues(DATA.leads,'Vendedor asignado'));
    html+=filterDate('desde','Desde')+filterDate('hasta','Hasta');
  } else if(currentTab==='llcs'){
    html+=multiSelectHTML('etapa','Etapa',getUniqueValues(DATA.llcs,'Etapa'));
    html+=multiSelectHTML('canal','Canal',getUniqueValues(DATA.llcs,'Canal de Origen'));
    html+=multiSelectHTML('pago','Pago',getUniqueValues(DATA.llcs,'Confirmaci\u00f3n de pago'));
    html+=filterDate('desde','Desde')+filterDate('hasta','Hasta');
  } else {
    html+=multiSelectHTML('estatus','Estatus',getUniqueValues(DATA.seguimientos,'Estatus del Lead'));
    html+=multiSelectHTML('canal','Canal',getUniqueValues(DATA.seguimientos,'Canal de Origen'));
    html+=multiSelectHTML('meeting','Meeting',getUniqueValues(DATA.seguimientos,'Estado del Meeting'));
    html+=multiSelectHTML('vendedor','Vendedor',getUniqueValues(DATA.seguimientos,'Vendedor'));
    html+=filterDate('desde','Desde')+filterDate('hasta','Hasta');
  }
  html+='<button class="btn-clear-filters" onclick="clearFilters()">Limpiar filtros</button>';
  bar.innerHTML=html;
}

function clearFilters(){filters={};buildFilters();updateMetrics();renderTable()}

function matchesMulti(value,filterKey){
  if(!filters[filterKey])return true;
  return filters[filterKey].includes(value);
}

function matchesDateRange(dateStr){
  if(!filters.desde&&!filters.hasta)return true;
  const d=parseDate(dateStr);if(!d)return false;
  if(filters.desde&&d<new Date(filters.desde))return false;
  if(filters.hasta&&d>new Date(filters.hasta+'T23:59:59'))return false;
  return true;
}

function getFilteredRows(){
  if(!DATA)return[];
  if(currentTab==='leads'){
    return DATA.leads.filter(r=>{
      if(!matchesMulti(r['Canal'],'canal'))return false;
      if(!matchesMulti(r['Calificaci\u00f3n']||r['Calificacion'],'calificacion'))return false;
      if(!matchesMulti(r['Vendedor asignado'],'vendedor'))return false;
      return matchesDateRange(r['Fecha']);
    });
  } else if(currentTab==='llcs'){
    return DATA.llcs.filter(r=>{
      if(!matchesMulti(r['Etapa'],'etapa'))return false;
      if(!matchesMulti(r['Canal de Origen'],'canal'))return false;
      if(!matchesMulti(r['Confirmaci\u00f3n de pago']||r['Confirmacion de pago'],'pago'))return false;
      return matchesDateRange(r['Fecha']);
    });
  } else {
    return DATA.seguimientos.filter(r=>{
      if(!matchesMulti(r['Estatus del Lead'],'estatus'))return false;
      if(!matchesMulti(r['Canal de Origen'],'canal'))return false;
      if(!matchesMulti(r['Estado del Meeting'],'meeting'))return false;
      if(!matchesMulti(r['Vendedor'],'vendedor'))return false;
      return matchesDateRange(r['Fecha \u00faltimo meeting']||r['Fecha ultimo meeting']);
    });
  }
}

// ===== RENDER TABLES =====
function renderLeads(rows){
  if(!rows.length)return'<div class="loading"><div class="loading-text">Sin datos con los filtros aplicados</div></div>';
  return `<table><thead><tr>
    <th></th><th>Fecha</th><th>Servicio</th><th>Nombre</th><th>Canal</th><th>Calificaci\u00f3n</th>
    <th>Tel\u00e9fono</th><th>Mail</th><th>Agend\u00f3?</th><th>Posibilidad</th><th>Modalidad</th><th>Vendedor</th>
  </tr></thead><tbody>${rows.map(r=>{const nk='lead_'+(normEmail(r['Mail'])||esc(r['Nombre y Apellido']));return `<tr>
    <td>${noteBtn(nk,r['Nombre y Apellido']||'Lead')}</td>
    <td>${esc(r['Fecha'])}</td>
    <td>${esc(r['Servicio'])}</td>
    <td><strong>${esc(r['Nombre y Apellido'])}</strong></td>
    <td>${esc(r['Canal'])}</td>
    <td>${calificacionBadge(r['Calificaci\u00f3n']||r['Calificacion'])}</td>
    <td>${esc(r['M\u00f3vil']||r['Movil']||r['Tel\u00e9fono']||r['Telefono'])}</td>
    <td>${esc(r['Mail'])}</td>
    <td>${r['\u00bfAgend\u00f3?']==='S\u00ed'?'<span class="badge badge-green">S\u00ed</span>':'<span class="badge badge-gray">'+esc(r['\u00bfAgend\u00f3?'])+'</span>'}</td>
    <td>${r['Posibilidad de cierre']==='S\u00ed'?'<span class="badge badge-green">S\u00ed</span>':'<span class="badge badge-gray">'+esc(r['Posibilidad de cierre'])+'</span>'}</td>
    <td>${esc(r['Modalidad de cierre'])}</td>
    <td>${esc(r['Vendedor asignado'])}</td>
  </tr>`}).join('')}</tbody></table>`;
}

function renderLLCs(rows){

  return `<table><thead><tr>
    <th></th><th>Fecha</th><th>LLC</th><th>Etapa</th><th>Nombre</th><th>Email</th>
    <th>Tel\u00e9fono</th><th>Canal</th><th>Vendedor</th><th>Pago</th>
  </tr></thead><tbody>${rows.map(r=>{const nk='llc_'+(normEmail(r['Email'])||esc(r['LLC']));return `<tr>
    <td>${noteBtn(nk,r['LLC']||'LLC')}</td>
    <td>${esc(r['Fecha'])}</td>
    <td><strong>${esc(r['LLC'])}</strong></td>
    <td>${etapaBadge(r['Etapa'])}</td>
    <td>${esc(r['Nombre'])}</td>
    <td>${esc(r['Email'])}</td>
    <td>${esc(r['Tel\u00e9fono']||r['Telefono'])}</td>
    <td>${esc(r['Canal de Origen'])}</td>
    <td>${esc(r['Vendedor'])}</td>
    <td>${pagoBadge(r['Confirmaci\u00f3n de pago']||r['Confirmacion de pago'])}</td>

function renderSeguimientos(rows){
  if(!rows.length)return'<div class="loading"><div class="loading-text">Sin datos con los filtros aplicados</div></div>';
  return `<table><thead><tr>
    <th></th><th>Fecha</th><th>Nombre</th><th>Mail</th><th>Estatus</th>
    <th>Vendedor</th><th>Canal</th><th>Meeting</th><th>Descripci\u00f3n</th>
  </tr></thead><tbody>${rows.map(r=>{
    const isSQL=(r['Estatus del Lead']||'').toLowerCase().includes('sql calificado');
    const nk='seg_'+(normEmail(r['Mail'])||(esc(r['Nombre'])+esc(r['Apellido'])));
    return `<tr class="${isSQL?'alert-row':''}">
    <td>${noteBtn(nk,(r['Nombre']||'')+' '+(r['Apellido']||''))}</td>
    <td>${esc(r['Fecha \u00faltimo meeting']||r['Fecha ultimo meeting'])}</td>
    <td><strong>${esc(r['Nombre'])} ${esc(r['Apellido'])}</strong></td>
    <td>${esc(r['Mail'])}</td>
    <td>${calificacionBadge(r['Estatus del Lead'])}</td>
    <td>${esc(r['Vendedor'])}</td>
    <td>${esc(r['Canal de Origen'])}</td>
    <td>${meetingBadge(r['Estado del Meeting'])}</td>
    <td style="white-space:normal;max-width:300px" title="${esc(r['Descripci\u00f3n']||r['Descripcion'])}">${esc(r['Descripci\u00f3n']||r['Descripcion']||'')}</td>
  </tr>`}).join('')}</tbody></table>`;
}

// ===== RENDER =====
function renderTable(){
  if(!DATA)return;
  const el=document.getElementById('tableContent');
  const rows=getFilteredRows();
  document.getElementById('tableTitle').textContent=TITLES[currentTab];
  document.getElementById('tableCount').textContent=rows.length+' registros';
  if(currentTab==='leads')el.innerHTML=renderLeads(rows);
  else if(currentTab==='llcs')el.innerHTML=renderLLCs(rows);
  else el.innerHTML=renderSeguimientos(rows);
}

function switchTab(tab){
  currentTab=tab;filters={};
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['leads','llcs','seguimientos'][i]===tab));
  updateMetrics();buildFilters();renderTable();
}

// ===== EXPORT =====
function getExportData(){
  const rows=getFilteredRows();let headers,data;
  if(currentTab==='leads'){
    headers=['Fecha','Servicio','Nombre','Canal','Calificacion','Telefono','Mail','Agendo','Posibilidad','Modalidad','Vendedor'];
    data=rows.map(r=>[r['Fecha'],r['Servicio'],r['Nombre y Apellido'],r['Canal'],r['Calificaci\u00f3n']||r['Calificacion'],r['M\u00f3vil']||r['Movil']||r['Tel\u00e9fono']||r['Telefono'],r['Mail'],r['\u00bfAgend\u00f3?'],r['Posibilidad de cierre'],r['Modalidad de cierre'],r['Vendedor asignado']]);
  }else if(currentTab==='llcs'){
    headers=['Fecha','LLC','Etapa','Nombre','Email','Telefono','Canal','Vendedor','Pago'];
    data=rows.map(r=>[r['Fecha'],r['LLC'],r['Etapa'],r['Nombre'],r['Email'],r['Tel\u00e9fono']||r['Telefono'],r['Canal de Origen'],r['Vendedor'],r['Confirmaci\u00f3n de pago']||r['Confirmacion de pago']]);
  }else{
    headers=['Fecha','Nombre','Mail','Estatus','Vendedor','Canal','Meeting','Descripcion'];
    data=rows.map(r=>[r['Fecha \u00faltimo meeting']||r['Fecha ultimo meeting'],(r['Nombre']||'')+' '+(r['Apellido']||''),r['Mail'],r['Estatus del Lead'],r['Vendedor'],r['Canal de Origen'],r['Estado del Meeting'],r['Descripci\u00f3n']||r['Descripcion']]);
  }
  return{headers,data};
}

function exportCSV(){
  const{headers,data}=getExportData();
  const csv=[headers.join(','),...data.map(r=>r.map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','))].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`SC_${TITLES[currentTab].replace(/ /g,'_')}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();URL.revokeObjectURL(a.href);
}

function exportPDF(){
  if(!window.jspdf||!window.jspdf.jsPDF){showError('Cargando libreria PDF, intenta de nuevo en unos segundos...');return}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  doc.setFillColor(0,22,39);doc.rect(0,0,297,25,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(16);doc.text('Start Companies',14,12);
  doc.setFontSize(10);doc.setTextColor(136,153,170);
  doc.text(TITLES[currentTab]+' - '+new Date().toLocaleDateString('es-AR'),14,20);
  const{headers,data}=getExportData();
  doc.autoTable({head:[headers],body:data.map(r=>r.map(v=>v||'')),startY:30,theme:'grid',
    styles:{fontSize:7,cellPadding:2,textColor:[30,30,30]},
    headStyles:{fillColor:[0,106,254],textColor:[255,255,255],fontStyle:'bold',fontSize:8},
    alternateRowStyles:{fillColor:[240,245,250]},margin:{left:10,right:10}});
  doc.save(`SC_${TITLES[currentTab].replace(/ /g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`);
}

// ===== FETCH =====
function showError(msg){const el=document.getElementById('errorBanner');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',10000)}

async function fetchData(){
  const btn=document.getElementById('btnRefresh');
  if(btn)btn.disabled=true;
  try{
    const res=await fetch('/.netlify/functions/zoho-data');
    if(!res.ok)throw new Error('HTTP '+res.status);
    DATA=await res.json();if(DATA.error)throw new Error(DATA.error);
    // Filter out TimelinesAI junk entries
    DATA.leads=DATA.leads.filter(r=>{
      const desc=(r['Descripci\u00f3n']||r['Descripcion']||'').toLowerCase();
      const name=(r['Nombre y Apellido']||'').toLowerCase();
      return !desc.includes('timelines') && !name.includes('new whatsapp contact');
    });
    await loadNotes();
    updateMetrics();buildFilters();renderTable();
    const cacheStatus=res.headers.get('X-Cache');
    const cacheLabel=cacheStatus==='HIT'?' (cache)':cacheStatus==='STALE'?' (cache anterior)':'';
    document.getElementById('lastUpdate').textContent='Actualizado: '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+cacheLabel;
    document.getElementById('errorBanner').style.display='none';
  }catch(err){showError('Error al cargar datos: '+err.message)}
  finally{if(btn)btn.disabled=false}
}

function manualRefresh(){fetchData()}

// ===== NOTES =====
let NOTES={};
let currentNoteKey='';

async function loadNotes(){
  try{const r=await fetch('/.netlify/functions/notes');if(r.ok)NOTES=await r.json()}catch(e){}
}

function noteBtn(key,label){
  const has=NOTES[key];
  const tip=has?has.text.substring(0,40)+'...':'Agregar nota';
  return `<button class="note-btn${has?' has-note':''}" onclick="openNote('${esc(key)}','${esc(label)}')" title="${esc(tip)}">${has?'\u270F\uFE0F':'\u270F\uFE0F'}</button>`;
}

function openNote(key,label){
  currentNoteKey=key;
  document.getElementById('noteTitle').textContent=label;
  const note=NOTES[key];
  document.getElementById('noteText').value=note?note.text:'';
  document.getElementById('noteWho').textContent=note?`Editado por ${note.user} - ${new Date(note.updatedAt).toLocaleString('es-AR')}`:'';
  document.getElementById('noteOverlay').classList.add('show');
  document.getElementById('noteText').focus();
}

function closeNote(){document.getElementById('noteOverlay').classList.remove('show');currentNoteKey=''}

async function saveNote(){
  const text=document.getElementById('noteText').value;
  const user=sessionStorage.getItem('sc_user')||localStorage.getItem('sc_user');
  let userName='';
  try{userName=JSON.parse(user).user||user}catch(e){userName=user}
  try{
    const r=await fetch('/.netlify/functions/notes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:currentNoteKey,text,user:userName})});
    if(r.ok){
      if(!text.trim()){delete NOTES[currentNoteKey]}
      else{NOTES[currentNoteKey]=await r.json()}
      renderTable();
    }
  }catch(e){showError('Error guardando nota: '+e.message)}
  closeNote();
}
