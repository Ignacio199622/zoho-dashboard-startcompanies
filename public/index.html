<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Companies — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#006AFE;--dark:#001627;--cyan:#01C9E2;--gold:#C9A227;--green:#00b67a;
  --surface:#0a2540;--surface2:#112d4a;--border:#1a3a5c;--text:#e8edf2;--text2:#8899aa;
  --radius:12px;
}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}
a{color:var(--cyan);text-decoration:none}

/* Login */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--dark)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:400px;text-align:center}
.login-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:28px;color:#fff;margin:0 auto 24px}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:32px}
.login-input{width:100%;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;margin-bottom:12px;outline:none;transition:border .2s}
.login-input:focus{border-color:var(--blue)}
.login-input::placeholder{color:var(--text2)}
.login-btn{width:100%;padding:12px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:8px}
.login-btn:hover{opacity:.9}
.login-error{color:#ff4757;font-size:13px;margin-top:12px;min-height:20px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:var(--surface);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:40px;height:40px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;letter-spacing:-0.5px}
.logo-text{font-size:18px;font-weight:600;color:var(--text)}
.logo-text span{color:var(--text2);font-weight:400}
.header-right{display:flex;align-items:center;gap:16px}
.refresh-badge{display:flex;align-items:center;gap:8px;background:var(--surface2);padding:6px 14px;border-radius:20px;font-size:13px;color:var(--text2)}
.refresh-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{font-size:12px;color:var(--text2)}
.user-badge{display:flex;align-items:center;gap:8px;background:var(--surface2);padding:6px 14px;border-radius:20px;font-size:13px;color:var(--text2)}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--text2);color:var(--text)}

/* Layout */
.container{max-width:1400px;margin:0 auto;padding:24px 32px}

/* Metric Cards */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;position:relative;overflow:hidden}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.metric-card:nth-child(1)::before{background:var(--blue)}
.metric-card:nth-child(2)::before{background:var(--cyan)}
.metric-card:nth-child(3)::before{background:var(--gold)}
.metric-card:nth-child(4)::before{background:var(--green)}
.metric-label{font-size:13px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.metric-value{font-size:32px;font-weight:700;line-height:1}
.metric-card:nth-child(1) .metric-value{color:var(--blue)}
.metric-card:nth-child(2) .metric-value{color:var(--cyan)}
.metric-card:nth-child(3) .metric-value{color:var(--gold)}
.metric-card:nth-child(4) .metric-value{color:var(--green)}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border-radius:var(--radius);padding:4px;border:1px solid var(--border)}
.tab{padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all .2s;border:none;background:none;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.active{background:var(--blue);color:#fff}

/* Filters */
.filters-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.filter-select,.filter-date{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:13px;outline:none;min-width:150px;transition:border .2s}
.filter-select:focus,.filter-date:focus{border-color:var(--blue)}
.filter-date{min-width:140px}
.filter-date::-webkit-calendar-picker-indicator{filter:invert(.7)}
.btn-clear-filters{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer;transition:all .2s;align-self:flex-end}
.btn-clear-filters:hover{border-color:var(--text2);color:var(--text)}

/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.table-title-group{display:flex;align-items:center;gap:16px}
.table-title{font-size:16px;font-weight:600}
.table-count{font-size:13px;color:var(--text2)}
.export-group{display:flex;gap:8px}
.btn-export{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-export:hover{border-color:var(--blue);color:var(--blue)}
.btn-export svg{width:14px;height:14px}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--surface2)}
th{padding:12px 16px;text-align:left;font-weight:600;color:var(--text2);text-transform:uppercase;font-size:11px;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
tr:hover td{background:rgba(0,106,254,.05)}
tr:last-child td{border-bottom:none}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.badge-blue{background:rgba(0,106,254,.15);color:#4d9aff}
.badge-cyan{background:rgba(1,201,226,.15);color:var(--cyan)}
.badge-gold{background:rgba(201,162,39,.15);color:var(--gold)}
.badge-green{background:rgba(0,182,122,.15);color:var(--green)}
.badge-red{background:rgba(255,71,87,.15);color:#ff4757}
.badge-gray{background:rgba(136,153,170,.15);color:var(--text2)}
.badge-purple{background:rgba(155,89,255,.15);color:#b388ff}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text2);font-size:14px}

/* Error */
.error-banner{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);border-radius:var(--radius);padding:16px 24px;margin-bottom:20px;color:#ff4757;font-size:14px;display:none}

/* Hide dashboard initially */
#dashboardApp{display:none}

/* Responsive */
@media(max-width:900px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .container{padding:16px}
  .header{padding:12px 16px}
  .filters-bar{flex-direction:column}
  .filter-select,.filter-date{min-width:100%}
}
@media(max-width:600px){
  .metrics{grid-template-columns:1fr}
  .tabs{overflow-x:auto}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">SC</div>
    <div class="login-title">Start Companies</div>
    <div class="login-sub">Ingresá tus credenciales para acceder al dashboard</div>
    <form onsubmit="handleLogin(event)">
      <input class="login-input" type="text" id="loginUser" placeholder="Usuario" autocomplete="username" required>
      <input class="login-input" type="password" id="loginPass" placeholder="Contrasena" autocomplete="current-password" required>
      <button class="login-btn" type="submit">Iniciar Sesion</button>
    </form>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardApp">
  <div class="header">
    <div class="logo">
      <div class="logo-mark">SC</div>
      <div class="logo-text">Start Companies <span>Dashboard</span></div>
    </div>
    <div class="header-right">
      <div class="refresh-badge">
        <div class="refresh-dot"></div>
        <span>Auto-refresh en <strong id="countdown">60</strong>s</span>
      </div>
      <div class="status-text" id="lastUpdate">Cargando...</div>
      <div class="user-badge" id="userBadge"></div>
      <button class="logout-btn" onclick="handleLogout()">Salir</button>
    </div>
  </div>

  <div class="container">
    <div class="error-banner" id="errorBanner"></div>

    <div class="metrics">
      <div class="metric-card">
        <div class="metric-label">Total Leads</div>
        <div class="metric-value" id="metricLeads">&mdash;</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Calificados</div>
        <div class="metric-value" id="metricCalificados">&mdash;</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">LLCs en Apertura</div>
        <div class="metric-value" id="metricLLCs">&mdash;</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Seguimientos Activos</div>
        <div class="metric-value" id="metricSeguimientos">&mdash;</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('leads')">Lead Totales</button>
      <button class="tab" onclick="switchTab('llcs')">LLCs Apertura</button>
      <button class="tab" onclick="switchTab('seguimientos')">Seguimientos</button>
    </div>

    <!-- Filters -->
    <div class="filters-bar" id="filtersBar"></div>

    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title-group">
          <div class="table-title" id="tableTitle">Lead Totales y Flujos</div>
          <div class="table-count" id="tableCount"></div>
        </div>
        <div class="export-group">
          <button class="btn-export" onclick="exportCSV()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            CSV
          </button>
          <button class="btn-export" onclick="exportPDF()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            PDF
          </button>
        </div>
      </div>
      <div class="table-scroll" id="tableContent">
        <div class="loading">
          <div class="spinner"></div>
          <div class="loading-text">Conectando con Zoho Analytics...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== AUTH ====================
const USERS = {
  tomas: 'd47edf81eaadf9bdd466903719e772e1846bc2f69eeb2cadb29780aa639eabea',
  belen: 'd47edf81eaadf9bdd466903719e772e1846bc2f69eeb2cadb29780aa639eabea',
  ignacio: 'd47edf81eaadf9bdd466903719e772e1846bc2f69eeb2cadb29780aa639eabea',
  santiago: 'd47edf81eaadf9bdd466903719e772e1846bc2f69eeb2cadb29780aa639eabea',
  ignaciocampo: 'd47edf81eaadf9bdd466903719e772e1846bc2f69eeb2cadb29780aa639eabea'
};

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function handleLogin(e) {
  e.preventDefault();
  const user = document.getElementById('loginUser').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const hash = await sha256(pass);
  if (USERS[user] && USERS[user] === hash) {
    sessionStorage.setItem('sc_user', user);
    showDashboard(user);
  } else {
    document.getElementById('loginError').textContent = 'Usuario o contrasena incorrectos';
  }
}

function handleLogout() {
  sessionStorage.removeItem('sc_user');
  location.reload();
}

function showDashboard(user) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboardApp').style.display = 'block';
  document.getElementById('userBadge').textContent = user;
  fetchData();
  startCountdown();
}

// Check session on load
(function checkSession() {
  const user = sessionStorage.getItem('sc_user');
  if (user && USERS[user]) {
    showDashboard(user);
  }
})();

// ==================== DATA & STATE ====================
let DATA = null;
let currentTab = 'leads';
let countdownValue = 60;
let countdownTimer = null;
let filters = {};

const TITLES = {
  leads: 'Lead Totales y Flujos',
  llcs: 'LLCs Apertura Mes Actual',
  seguimientos: 'Seguimientos'
};

// ==================== FILTERS ====================
function getUniqueValues(rows, key) {
  const vals = new Set();
  rows.forEach(r => { const v = r[key]; if (v) vals.add(v); });
  return [...vals].sort();
}

function parseDate(str) {
  if (!str) return null;
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function buildFilters() {
  if (!DATA) return;
  const bar = document.getElementById('filtersBar');
  let html = '';

  if (currentTab === 'leads') {
    const canales = getUniqueValues(DATA.leads, 'Canal');
    const califs = getUniqueValues(DATA.leads, 'Calificaci\u00f3n');
    const vendedores = getUniqueValues(DATA.leads, 'Vendedor asignado');
    html += filterSelect('canal', 'Canal', canales);
    html += filterSelect('calificacion', 'Calificaci\u00f3n', califs);
    html += filterSelect('vendedor', 'Vendedor', vendedores);
    html += filterDate('desde', 'Desde');
    html += filterDate('hasta', 'Hasta');
  } else if (currentTab === 'llcs') {
    const etapas = getUniqueValues(DATA.llcs, 'Etapa');
    const canales = getUniqueValues(DATA.llcs, 'Canal de Origen');
    const pagos = getUniqueValues(DATA.llcs, 'Confirmaci\u00f3n de pago');
    html += filterSelect('etapa', 'Etapa', etapas);
    html += filterSelect('canal', 'Canal', canales);
    html += filterSelect('pago', 'Pago', pagos);
    html += filterDate('desde', 'Desde');
    html += filterDate('hasta', 'Hasta');
  } else {
    const estatus = getUniqueValues(DATA.seguimientos, 'Estatus del Lead');
    const canales = getUniqueValues(DATA.seguimientos, 'Canal de Origen');
    const meetings = getUniqueValues(DATA.seguimientos, 'Estado del Meeting');
    const vendedores = getUniqueValues(DATA.seguimientos, 'Vendedor');
    html += filterSelect('estatus', 'Estatus', estatus);
    html += filterSelect('canal', 'Canal', canales);
    html += filterSelect('meeting', 'Meeting', meetings);
    html += filterSelect('vendedor', 'Vendedor', vendedores);
    html += filterDate('desde', 'Desde');
    html += filterDate('hasta', 'Hasta');
  }

  html += '<button class="btn-clear-filters" onclick="clearFilters()">Limpiar filtros</button>';
  bar.innerHTML = html;

  // Restore filter values
  Object.entries(filters).forEach(([k, v]) => {
    const el = document.getElementById('filter_' + k);
    if (el) el.value = v;
  });
}

function filterSelect(id, label, options) {
  return `<div class="filter-group">
    <span class="filter-label">${label}</span>
    <select class="filter-select" id="filter_${id}" onchange="onFilterChange()">
      <option value="">Todos</option>
      ${options.map(o => `<option value="${esc(o)}">${esc(o)}</option>`).join('')}
    </select>
  </div>`;
}

function filterDate(id, label) {
  return `<div class="filter-group">
    <span class="filter-label">${label}</span>
    <input type="date" class="filter-date" id="filter_${id}" onchange="onFilterChange()">
  </div>`;
}

function onFilterChange() {
  // Read all current filter values
  filters = {};
  document.querySelectorAll('.filter-select, .filter-date').forEach(el => {
    const key = el.id.replace('filter_', '');
    if (el.value) filters[key] = el.value;
  });
  renderTable();
}

function clearFilters() {
  filters = {};
  document.querySelectorAll('.filter-select, .filter-date').forEach(el => el.value = '');
  renderTable();
}

function getFilteredRows() {
  if (!DATA) return [];
  let rows;
  if (currentTab === 'leads') {
    rows = DATA.leads.filter(r => {
      if (filters.canal && r['Canal'] !== filters.canal) return false;
      if (filters.calificacion && (r['Calificaci\u00f3n'] || r['Calificacion']) !== filters.calificacion) return false;
      if (filters.vendedor && r['Vendedor asignado'] !== filters.vendedor) return false;
      if (filters.desde || filters.hasta) {
        const d = parseDate(r['Fecha']);
        if (!d) return false;
        if (filters.desde && d < new Date(filters.desde)) return false;
        if (filters.hasta && d > new Date(filters.hasta + 'T23:59:59')) return false;
      }
      return true;
    });
  } else if (currentTab === 'llcs') {
    rows = DATA.llcs.filter(r => {
      if (filters.etapa && r['Etapa'] !== filters.etapa) return false;
      if (filters.canal && r['Canal de Origen'] !== filters.canal) return false;
      if (filters.pago && (r['Confirmaci\u00f3n de pago'] || r['Confirmacion de pago']) !== filters.pago) return false;
      if (filters.desde || filters.hasta) {
        const d = parseDate(r['Fecha']);
        if (!d) return false;
        if (filters.desde && d < new Date(filters.desde)) return false;
        if (filters.hasta && d > new Date(filters.hasta + 'T23:59:59')) return false;
      }
      return true;
    });
  } else {
    rows = DATA.seguimientos.filter(r => {
      if (filters.estatus && r['Estatus del Lead'] !== filters.estatus) return false;
      if (filters.canal && r['Canal de Origen'] !== filters.canal) return false;
      if (filters.meeting && r['Estado del Meeting'] !== filters.meeting) return false;
      if (filters.vendedor && r['Vendedor'] !== filters.vendedor) return false;
      if (filters.desde || filters.hasta) {
        const d = parseDate(r['Fecha \u00faltimo meeting'] || r['Fecha ultimo meeting']);
        if (!d) return false;
        if (filters.desde && d < new Date(filters.desde)) return false;
        if (filters.hasta && d > new Date(filters.hasta + 'T23:59:59')) return false;
      }
      return true;
    });
  }
  return rows;
}

// ==================== BADGES ====================
function calificacionBadge(val) {
  if (!val) return '<span class="badge badge-gray">Sin dato</span>';
  const v = val.toLowerCase();
  if (v.includes('sql calificado')) return `<span class="badge badge-green">${val}</span>`;
  if (v.includes('en calificaci\u00f3n') || v.includes('en calificacion')) return `<span class="badge badge-cyan">${val}</span>`;
  if (v.includes('no show')) return `<span class="badge badge-red">${val}</span>`;
  if (v.includes('nuevo mql')) return `<span class="badge badge-blue">${val}</span>`;
  if (v.includes('form nunca')) return `<span class="badge badge-gold">${val}</span>`;
  if (v.includes('no se detect')) return `<span class="badge badge-gray">${val}</span>`;
  return `<span class="badge badge-gray">${val}</span>`;
}

function etapaBadge(val) {
  if (!val) return '<span class="badge badge-gray">Sin dato</span>';
  const v = val.toLowerCase();
  if (v.includes('confirmada') || v.includes('cuenta bancaria confirmada')) return `<span class="badge badge-green">${val}</span>`;
  if (v.includes('cuenta bancaria') && !v.includes('confirmada')) return `<span class="badge badge-cyan">${val}</span>`;
  if (v.includes('filing')) return `<span class="badge badge-blue">${val}</span>`;
  if (v.includes('activa')) return `<span class="badge badge-gold">${val}</span>`;
  return `<span class="badge badge-gray">${val}</span>`;
}

function meetingBadge(val) {
  if (!val) return '<span class="badge badge-gray">Sin dato</span>';
  const v = val.toLowerCase();
  if (v.includes('asisti\u00f3') || v.includes('asistio')) return `<span class="badge badge-green">${val}</span>`;
  if (v.includes('reagend\u00f3') || v.includes('reagendo')) return `<span class="badge badge-gold">${val}</span>`;
  if (v.includes('no asisti\u00f3') || v.includes('no asistio')) return `<span class="badge badge-red">${val}</span>`;
  if (v.includes('sin informaci\u00f3n') || v.includes('sin informacion')) return `<span class="badge badge-gray">${val}</span>`;
  return `<span class="badge badge-gray">${val}</span>`;
}

function pagoBadge(val) {
  if (!val) return '<span class="badge badge-gray">Sin dato</span>';
  const v = val.toLowerCase();
  if (v.includes('stripe')) return `<span class="badge badge-purple">${val}</span>`;
  if (v.includes('transferencia')) return `<span class="badge badge-cyan">${val}</span>`;
  if (v.includes('cripto')) return `<span class="badge badge-gold">${val}</span>`;
  if (v.includes('sin pago')) return `<span class="badge badge-gray">${val}</span>`;
  return `<span class="badge badge-gray">${val}</span>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== RENDER TABLES ====================
function renderLeads(rows) {
  if (!rows.length) return '<div class="loading"><div class="loading-text">Sin datos con los filtros aplicados</div></div>';
  return `<table>
    <thead><tr>
      <th>Fecha</th><th>Servicio</th><th>Nombre</th><th>Canal</th><th>Calificaci\u00f3n</th>
      <th>Mail</th><th>Agend\u00f3?</th><th>Posibilidad</th><th>Modalidad</th><th>Vendedor</th>
    </tr></thead>
    <tbody>${rows.map(r => `<tr>
      <td>${esc(r['Fecha'])}</td>
      <td>${esc(r['Servicio'])}</td>
      <td><strong>${esc(r['Nombre y Apellido'])}</strong></td>
      <td>${esc(r['Canal'])}</td>
      <td>${calificacionBadge(r['Calificaci\u00f3n'] || r['Calificacion'])}</td>
      <td>${esc(r['Mail'])}</td>
      <td>${r['\u00bfAgend\u00f3?'] === 'S\u00ed' ? '<span class="badge badge-green">S\u00ed</span>' : '<span class="badge badge-gray">' + esc(r['\u00bfAgend\u00f3?']) + '</span>'}</td>
      <td>${r['Posibilidad de cierre'] === 'S\u00ed' ? '<span class="badge badge-green">S\u00ed</span>' : '<span class="badge badge-gray">' + esc(r['Posibilidad de cierre']) + '</span>'}</td>
      <td>${esc(r['Modalidad de cierre'])}</td>
      <td>${esc(r['Vendedor asignado'])}</td>
    </tr>`).join('')}</tbody></table>`;
}

function renderLLCs(rows) {
  if (!rows.length) return '<div class="loading"><div class="loading-text">Sin datos con los filtros aplicados</div></div>';
  return `<table>
    <thead><tr>
      <th>Fecha</th><th>LLC</th><th>Etapa</th><th>Nombre</th><th>Email</th>
      <th>Tel\u00e9fono</th><th>Canal</th><th>Vendedor</th><th>Pago</th>
    </tr></thead>
    <tbody>${rows.map(r => `<tr>
      <td>${esc(r['Fecha'])}</td>
      <td><strong>${esc(r['LLC'])}</strong></td>
      <td>${etapaBadge(r['Etapa'])}</td>
      <td>${esc(r['Nombre'])}</td>
      <td>${esc(r['Email'])}</td>
      <td>${esc(r['Tel\u00e9fono'] || r['Telefono'])}</td>
      <td>${esc(r['Canal de Origen'])}</td>
      <td>${esc(r['Vendedor'])}</td>
      <td>${pagoBadge(r['Confirmaci\u00f3n de pago'] || r['Confirmacion de pago'])}</td>
    </tr>`).join('')}</tbody></table>`;
}

function renderSeguimientos(rows) {
  if (!rows.length) return '<div class="loading"><div class="loading-text">Sin datos con los filtros aplicados</div></div>';
  return `<table>
    <thead><tr>
      <th>Fecha</th><th>Nombre</th><th>Mail</th><th>Estatus</th>
      <th>Vendedor</th><th>Canal</th><th>Meeting</th><th>Descripci\u00f3n</th>
    </tr></thead>
    <tbody>${rows.map(r => `<tr>
      <td>${esc(r['Fecha \u00faltimo meeting'] || r['Fecha ultimo meeting'])}</td>
      <td><strong>${esc(r['Nombre'])} ${esc(r['Apellido'])}</strong></td>
      <td>${esc(r['Mail'])}</td>
      <td>${calificacionBadge(r['Estatus del Lead'])}</td>
      <td>${esc(r['Vendedor'])}</td>
      <td>${esc(r['Canal de Origen'])}</td>
      <td>${meetingBadge(r['Estado del Meeting'])}</td>
      <td title="${esc(r['Descripci\u00f3n'] || r['Descripcion'])}">${esc((r['Descripci\u00f3n'] || r['Descripcion'] || '').substring(0, 60))}</td>
    </tr>`).join('')}</tbody></table>`;
}

// ==================== METRICS & TABLE ====================
function updateMetrics(data) {
  document.getElementById('metricLeads').textContent = data.leads.length;
  const calificados = data.leads.filter(r => {
    const c = (r['Calificaci\u00f3n'] || r['Calificacion'] || '').toLowerCase();
    return c.includes('sql calificado');
  }).length;
  document.getElementById('metricCalificados').textContent = calificados;
  document.getElementById('metricLLCs').textContent = data.llcs.length;
  document.getElementById('metricSeguimientos').textContent = data.seguimientos.length;
}

function renderTable() {
  if (!DATA) return;
  const el = document.getElementById('tableContent');
  const titleEl = document.getElementById('tableTitle');
  const countEl = document.getElementById('tableCount');
  titleEl.textContent = TITLES[currentTab];

  const rows = getFilteredRows();
  countEl.textContent = rows.length + ' registros';

  if (currentTab === 'leads') {
    el.innerHTML = renderLeads(rows);
  } else if (currentTab === 'llcs') {
    el.innerHTML = renderLLCs(rows);
  } else {
    el.innerHTML = renderSeguimientos(rows);
  }
}

function switchTab(tab) {
  currentTab = tab;
  filters = {};
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['leads','llcs','seguimientos'][i] === tab);
  });
  buildFilters();
  renderTable();
}

// ==================== EXPORT ====================
function getExportData() {
  const rows = getFilteredRows();
  let headers, data;

  if (currentTab === 'leads') {
    headers = ['Fecha','Servicio','Nombre','Canal','Calificaci\u00f3n','Mail','Agend\u00f3','Posibilidad','Modalidad','Vendedor'];
    data = rows.map(r => [
      r['Fecha'], r['Servicio'], r['Nombre y Apellido'], r['Canal'],
      r['Calificaci\u00f3n'] || r['Calificacion'], r['Mail'],
      r['\u00bfAgend\u00f3?'], r['Posibilidad de cierre'], r['Modalidad de cierre'], r['Vendedor asignado']
    ]);
  } else if (currentTab === 'llcs') {
    headers = ['Fecha','LLC','Etapa','Nombre','Email','Tel\u00e9fono','Canal','Vendedor','Pago'];
    data = rows.map(r => [
      r['Fecha'], r['LLC'], r['Etapa'], r['Nombre'], r['Email'],
      r['Tel\u00e9fono'] || r['Telefono'], r['Canal de Origen'], r['Vendedor'],
      r['Confirmaci\u00f3n de pago'] || r['Confirmacion de pago']
    ]);
  } else {
    headers = ['Fecha','Nombre','Mail','Estatus','Vendedor','Canal','Meeting','Descripci\u00f3n'];
    data = rows.map(r => [
      r['Fecha \u00faltimo meeting'] || r['Fecha ultimo meeting'],
      (r['Nombre'] || '') + ' ' + (r['Apellido'] || ''), r['Mail'],
      r['Estatus del Lead'], r['Vendedor'], r['Canal de Origen'],
      r['Estado del Meeting'], r['Descripci\u00f3n'] || r['Descripcion']
    ]);
  }
  return { headers, data };
}

function exportCSV() {
  const { headers, data } = getExportData();
  const csvRows = [headers.join(',')];
  data.forEach(row => {
    csvRows.push(row.map(v => `"${(v || '').replace(/"/g, '""')}"`).join(','));
  });
  const blob = new Blob(['\uFEFF' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `SC_${TITLES[currentTab].replace(/ /g,'_')}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

  doc.setFillColor(0, 22, 39);
  doc.rect(0, 0, 297, 25, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(16);
  doc.text('Start Companies', 14, 12);
  doc.setFontSize(10);
  doc.setTextColor(136, 153, 170);
  doc.text(TITLES[currentTab] + ' - ' + new Date().toLocaleDateString('es-AR'), 14, 20);

  const { headers, data } = getExportData();

  doc.autoTable({
    head: [headers],
    body: data.map(row => row.map(v => v || '')),
    startY: 30,
    theme: 'grid',
    styles: { fontSize: 7, cellPadding: 2, textColor: [30, 30, 30] },
    headStyles: { fillColor: [0, 106, 254], textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 8 },
    alternateRowStyles: { fillColor: [240, 245, 250] },
    margin: { left: 10, right: 10 }
  });

  doc.save(`SC_${TITLES[currentTab].replace(/ /g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`);
}

// ==================== DATA FETCH ====================
function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 10000);
}

async function fetchData() {
  try {
    const res = await fetch('/.netlify/functions/zoho-data');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    if (DATA.error) throw new Error(DATA.error);
    updateMetrics(DATA);
    buildFilters();
    renderTable();
    const now = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('lastUpdate').textContent = 'Actualizado: ' + now;
    document.getElementById('errorBanner').style.display = 'none';
  } catch (err) {
    showError('Error al cargar datos: ' + err.message);
  }
}

function startCountdown() {
  countdownValue = 60;
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownValue--;
    document.getElementById('countdown').textContent = countdownValue;
    if (countdownValue <= 0) {
      fetchData();
      countdownValue = 60;
    }
  }, 1000);
}
</script>
